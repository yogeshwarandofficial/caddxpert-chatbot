<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CADDXpert AI Chatbot — Embed Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0f0f0f;
      color: #e5e5e5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(227, 30, 36, 0.12);
      border: 1px solid rgba(227, 30, 36, 0.3);
      color: #E31E24;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 999px;
      margin-bottom: 24px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .badge span {
      width: 7px;
      height: 7px;
      background: #E31E24;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    h1 {
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 700;
      text-align: center;
      line-height: 1.2;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #ffffff 0%, #a0a0a0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    h1 em {
      font-style: normal;
      background: linear-gradient(135deg, #E31E24 0%, #ff6b6b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p.subtitle {
      font-size: 16px;
      color: #888;
      text-align: center;
      max-width: 480px;
      line-height: 1.6;
      margin-bottom: 48px;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 32px;
      max-width: 560px;
      width: 100%;
      margin-bottom: 40px;
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 16px;
    }

    pre {
      background: #0d0d0d;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 16px 20px;
      font-size: 13px;
      color: #6ee7b7;
      overflow-x: auto;
      line-height: 1.7;
      font-family: 'Courier New', monospace;
    }

    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      max-width: 560px;
      width: 100%;
      margin-bottom: 48px;
    }

    .feature {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }

    .feature-icon {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .feature-label {
      font-size: 13px;
      font-weight: 600;
      color: #ccc;
    }

    .feature-desc {
      font-size: 11.5px;
      color: #666;
      margin-top: 4px;
      line-height: 1.4;
    }

    footer {
      font-size: 12px;
      color: #444;
      text-align: center;
    }

    footer a {
      color: #E31E24;
      text-decoration: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>

 
  <div class="card">
    <div class="card-title">Embed snippet for production</div>
    <pre>&lt;script
  src="https://caddxpert-chatbot-ts5v.onrender.com/widget.js"
  data-api="https://caddxpert-chatbot-ts5v.onrender.com"
&gt;&lt;/script&gt;</pre>
  </div>

  <footer>
    Built by <a href="https://caddxpertai.in" target="_blank">CADDXpert AI Innovations</a>
    &nbsp;·&nbsp; Powered by CAD Point, Thiruvarur
  </footer>

  <!-- ✅ CADDXpert Chatbot Widget (local) — served by Express on http://localhost:3000 -->
  <script src="/widget.js" data-api="http://localhost:3000"></script>

</body>
</html>
